<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Ticket de Venta</title>
    <style>
        @page {
            size: 80mm 200mm;
            margin: 0;
        }
        body {
            font-family: 'Arial', sans-serif;
            font-size: 10pt;
            margin: 0; /* Ajustado de 10mm a 0 para maximizar espacio POS */
            padding: 5mm;
        }
        .header { text-align: center; margin-bottom: 10px; }
        .tabla-productos { width: 100%; border-collapse: collapse; }
        .text-right { text-align: right; }
        .linea { border-top: 1px dashed black; margin: 5px 0; height: 1px; }
        /* Evita que las tablas se corten entre páginas de forma abrupta */
        tr { page-break-inside: avoid; }
    </style>
</head>
<body>
    <div class="header">
        <h2>TICKET DE VENTA</h2>
        <p th:text="${#temporals.format(sale.creationDate, 'EEEE, dd MMMM yyyy HH:mm')}"></p>
        <p>ID Venta: <span th:text="${sale.id}">001</span></p>
    </div>

    <div class="linea"></div>

    <table class="tabla-productos">
        <thead>
            <tr>
                <th style="text-align: left;">Cant.</th>
                <th style="text-align: left;">Prod.</th>
                <th class="text-right">Total</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="det : ${sale.detail}">
                <td th:text="${det.productQuantity}">1</td>
                <td th:text="${det.productName}">Producto</td>
                <td class="text-right" th:text="${#numbers.formatCurrency(det.subtotal)}">$0.00</td>
            </tr>
        </tbody>
    </table>

    <div class="linea"></div>

    <div class="text-right">
        <strong>TOTAL: </strong>
        <span th:text="${#numbers.formatCurrency(sale.total)}">$0.00</span>
    </div>

    <div style="margin-top: 15px; text-align: center;">
        <p>¡Gracias por su compra!</p>
    </div>
</body>
</html>
